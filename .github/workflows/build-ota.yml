name: Build OTA Package

on:
  workflow_dispatch:
    inputs:
      use_upx:
        description: 'build with upx'
        required: false
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ota:
    name: Build OTA Package
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          musl-gcc --version

      - name: Install UPX
        if: inputs.use_upx == true
        run: |
          sudo apt-get install -y upx-ucl
          upx --version

      - name: Validate version numbers
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BACKEND_VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' backend/Cargo.toml | head -n 1)
          FRONTEND_VERSION=$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' frontend/package.json | head -n 1)

          echo "VERSION=$VERSION"
          echo "backend/Cargo.toml=$BACKEND_VERSION"
          echo "frontend/package.json=$FRONTEND_VERSION"

          if [ "$BACKEND_VERSION" != "$VERSION" ]; then
            echo "backend/Cargo.toml version does not match VERSION"
            exit 1
          fi

          if [ "$FRONTEND_VERSION" != "$VERSION" ]; then
            echo "frontend/package.json version does not match VERSION"
            exit 1
          fi

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
          cache-targets: true
          cache-all-crates: true

      - name: Build backend (aarch64-unknown-linux-musl)
        working-directory: backend
        run: |
          echo "🦀 构建后端 (aarch64-unknown-linux-musl)..."

          export CC_AARCH64_UNKNOWN_LINUX_MUSL=musl-gcc
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
          export SQLITE3_STATIC=1
          export LIBSQLITE3_SYS_USE_PKG_CONFIG=0

          cargo build --locked --release --target aarch64-unknown-linux-musl

          BINARY_PATH="target/aarch64-unknown-linux-musl/release/udx710"

          echo "后端构建完成:"
          ls -lh "$BINARY_PATH"
          file "$BINARY_PATH"

      - name: Compress binary with UPX
        if: inputs.use_upx == true
        run: |
          BINARY_PATH="backend/target/aarch64-unknown-linux-musl/release/udx710"

          echo "使用 UPX 压缩..."
          BEFORE_SIZE=$(stat -c%s "$BINARY_PATH")

          upx --best --lzma "$BINARY_PATH"

          AFTER_SIZE=$(stat -c%s "$BINARY_PATH")
          RATIO=$(echo "scale=1; 100 - ($AFTER_SIZE * 100 / $BEFORE_SIZE)" | bc)

          echo "压缩完成，节省 ${RATIO}%"
          ls -lh "$BINARY_PATH"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: frontend
        run: |
          echo "🎨 构建前端..."
          pnpm install --frozen-lockfile --prefer-offline
          pnpm run build

          echo "前端构建完成:"
          ls -lh dist/

      - name: Package OTA
        id: package
        run: |
          echo "=========================================="
          echo "  生成 OTA 更新包"
          echo "=========================================="
          echo ""

          VERSION="${{ steps.version.outputs.version }}"
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ARCH="aarch64-unknown-linux-musl"

          BINARY_PATH="backend/target/aarch64-unknown-linux-musl/release/udx710"
          FRONTEND_DIR="frontend/dist"

          if [ ! -f "$BINARY_PATH" ]; then
            echo "错误: 后端二进制不存在"
            exit 1
          fi

          if [ ! -d "$FRONTEND_DIR" ]; then
            echo "错误: 前端构建产物不存在"
            exit 1
          fi

          OTA_TMP=$(mktemp -d)

          echo "版本: $VERSION"
          echo "Commit: $COMMIT"
          echo "构建时间: $BUILD_TIME"
          echo "架构: $ARCH"
          echo ""

          echo "复制后端二进制..."
          cp "$BINARY_PATH" "$OTA_TMP/udx710"
          chmod 755 "$OTA_TMP/udx710"

          BINARY_MD5=$(md5sum "$OTA_TMP/udx710" | cut -d' ' -f1)
          echo "binary md5: $BINARY_MD5"

          echo "复制前端文件..."
          mkdir -p "$OTA_TMP/www"
          cp -r "$FRONTEND_DIR"/* "$OTA_TMP/www/"

          echo "计算前端 MD5..."
          FRONTEND_MD5=$(find "$OTA_TMP/www" -type f -exec md5sum {} \; | cut -d' ' -f1 | sort | md5sum | cut -d' ' -f1)
          echo "frontend md5: $FRONTEND_MD5"

          cat > "$OTA_TMP/meta.json" <<EOF
          {
              "version": "$VERSION",
              "commit": "$COMMIT",
              "build_time": "$BUILD_TIME",
              "binary_md5": "$BINARY_MD5",
              "frontend_md5": "$FRONTEND_MD5",
              "arch": "$ARCH"
          }
          EOF

          cat "$OTA_TMP/meta.json"
          echo ""

          mkdir -p release

          OTA_FILE="release/udx710-ota-${VERSION}.tar.gz"
          echo "打包 OTA 更新包..."
          cd "$OTA_TMP"
          tar -czf "$GITHUB_WORKSPACE/$OTA_FILE" meta.json udx710 www
          cd "$GITHUB_WORKSPACE"

          echo ""
          echo "=========================================="
          echo "OTA 更新包打包完成"
          echo "=========================================="
          echo ""
          echo "输出文件: $OTA_FILE"
          ls -lh "$OTA_FILE"
          echo ""
          echo "包内容:"
          tar -tzf "$OTA_FILE" | head -20
          echo ""

          OTA_MD5=$(md5sum "$OTA_FILE" | cut -d' ' -f1)
          echo "OTA md5: $OTA_MD5"
          echo ""

          echo "ota_file=$OTA_FILE" >> "$GITHUB_OUTPUT"
          echo "ota_md5=$OTA_MD5" >> "$GITHUB_OUTPUT"

      - name: Upload OTA package
        uses: actions/upload-artifact@v6
        with:
          name: udx710-ota-${{ steps.version.outputs.version }}
          path: release/udx710-ota-${{ steps.version.outputs.version }}.tar.gz
          retention-days: 90
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/udx710-ota-${{ steps.version.outputs.version }}.tar.gz
          body: |
            ## OTA 更新包

            **版本**: ${{ steps.version.outputs.version }}
            **Commit**: ${{ github.sha }}
            **构建时间**: ${{ github.event.repository.updated_at }}

            ### 安装说明

            ```bash
            curl -X POST http://192.168.66.1:3000/api/ota/upload \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@udx710-ota-${{ steps.version.outputs.version }}.tar.gz"

            curl -X POST http://192.168.66.1:3000/api/ota/apply \
              -H "Content-Type: application/json" \
              -d '{"restart_now":true}'
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          {
            echo "## OTA 包构建完成"
            echo ""
            echo "| 项目 | 值 |"
            echo "|------|-----|"
            echo "| 版本 | ${{ steps.version.outputs.version }} |"
            echo "| Commit | ${{ github.sha }} |"
            echo "| 架构 | aarch64-unknown-linux-musl |"
            echo "| UPX 压缩 | ${{ inputs.use_upx }} |"
            echo ""
            echo "### 产物"
            echo "- \`${{ steps.package.outputs.ota_file }}\`"
            echo "- MD5: \`${{ steps.package.outputs.ota_md5 }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
